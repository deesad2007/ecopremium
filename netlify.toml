[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/order"
  to = "/.netlify/functions/order"
  status = 200

# SPA-подобный фоллбэк не нужен — сайт многостраничный статический.
# Astro генерирует 404.html автоматически.
